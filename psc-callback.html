<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Connexion Pro Santé Connect… · BreathIQ</title>
  <link rel="stylesheet" href="style.min.css?v=20260617">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:#f9fafb; }
    .callback-card { background:#fff; border-radius:1rem; padding:2.5rem; text-align:center; max-width:400px; box-shadow:0 4px 24px rgba(0,0,0,0.08); }
    .spinner { width:2.5rem; height:2.5rem; border:3px solid #e5e7eb; border-top-color:#0e4a96; border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 1.25rem; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .error-box { background:#fef2f2; border:1px solid #fca5a5; border-radius:0.5rem; padding:1rem; color:#991b1b; font-size:0.85rem; margin-top:1rem; display:none; }
  </style>
</head>
<body>
  <div class="callback-card" id="card">
    <div class="spinner" id="spinner"></div>
    <h2 style="font-size:1.1rem;font-weight:700;margin:0 0 0.5rem;">Connexion en cours…</h2>
    <p style="font-size:0.85rem;color:#6b7280;margin:0;">Authentification Pro Santé Connect</p>
    <div class="error-box" id="errorBox"></div>
  </div>
  <script src="js/psc-auth.js"></script>
  <script>
    (async () => {
      const params = new URLSearchParams(window.location.search);
      const code  = params.get('code');
      const state = params.get('state');
      const error = params.get('error');

      if (error) {
        showError('Connexion refusée : ' + (params.get('error_description') || error));
        return;
      }
      if (!code || !state) {
        showError('Paramètres manquants — retournez à la page d\'accueil.');
        return;
      }

      try {
        const tokens = await BIQ_PSC.exchangeCode(code, state);
        sessionStorage.setItem('psc_token', tokens.access_token);
        const pro = await BIQ_PSC.getProfessionalInfo(tokens.access_token);
        sessionStorage.setItem('psc_professional', JSON.stringify(pro));
        // Redirection vers la page principale section soignant
        window.location.href = '/?psc=success#soignant';
      } catch (err) {
        showError('Erreur d\'authentification : ' + err.message);
      }
    })();

    function showError(msg) {
      document.getElementById('spinner').style.display = 'none';
      const box = document.getElementById('errorBox');
      box.textContent = msg;
      box.style.display = 'block';
      setTimeout(() => { window.location.href = '/'; }, 5000);
    }
  </script>
</body>
</html>
