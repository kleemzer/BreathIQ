[build]
  publish = "."

# ── En-têtes globaux sécurité ──────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    # CSP élargie pour APIs live santé publique
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com; style-src 'self' https://unpkg.com https://fonts.googleapis.com 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://unpkg.com https://*.tile.openstreetmap.org https://*.openstreetmap.org https://*.basemaps.cartocdn.com; connect-src 'self' https://unpkg.com https://*.tile.openstreetmap.org https://*.basemaps.cartocdn.com https://fonts.googleapis.com https://fonts.gstatic.com https://api.openaq.org https://data.santepubliquefrance.fr https://www.data.gouv.fr https://static.data.gouv.fr https://data.cdc.gov https://opendata.ecdc.europa.eu https://data.europa.eu https://nominatim.openstreetmap.org https://overpass-api.de https://overpass.kumi.systems https://lz4.overpass-api.de https://air-quality-api.open-meteo.com https://api.waqi.info https://8oi9s0nnth.apigw.ntruss.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self' mailto:"

# ── Cache agressif pour assets statiques ──────────────────────────────────
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=300, stale-while-revalidate=3600"

# ── Redirects ─────────────────────────────────────────────────────────────
[[redirects]]
  from = "https://www.breathiq.fr/*"
  to   = "https://breathiq.fr/:splat"
  status = 301
  force  = true
