<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Page introuvable — BreathIQ</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(145deg, #0F2A45 0%, #1A3C5E 100%);
      color: #E8F0F7; min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 2rem;
    }
    .rings { position: relative; width: 120px; height: 120px; margin: 0 auto 2rem; display: flex; align-items: center; justify-content: center; }
    .ring { position: absolute; border-radius: 50%; border: 1px solid rgba(42,127,212,.3); }
    .r1 { width: 120px; height: 120px; }
    .r2 { width: 80px; height: 80px; border-color: rgba(14,140,122,.5); }
    .r3 { width: 44px; height: 44px; border-color: rgba(42,127,212,.8); }
    .dot { width: 20px; height: 20px; border-radius: 50%; background: #0E8C7A; position: relative; z-index: 1; }
    .code { font-size: 5rem; font-weight: 800; letter-spacing: -.05em; color: #2A7FD4; line-height: 1; margin-bottom: .5rem; }
    h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 1rem; }
    p { font-size: .95rem; color: #A0B4C8; max-width: 400px; line-height: 1.7; margin-bottom: 2rem; }
    .btn {
      display: inline-flex; align-items: center; gap: .5rem;
      padding: .7rem 1.6rem; border-radius: 999px;
      background: #2A7FD4; color: #fff; font-weight: 600; font-size: .9rem;
      text-decoration: none; transition: background .15s;
    }
    .btn:hover { background: #4A9FE8; }
    .brand { position: absolute; top: 1.5rem; left: 50%; transform: translateX(-50%); font-size: 1.1rem; font-weight: 800; color: rgba(255,255,255,.7); }
    .brand strong { color: #2A7FD4; }
  </style>
</head>
<body>
  <div class="brand">Breath<strong>IQ</strong></div>
  <div class="rings">
    <div class="ring r1"></div>
    <div class="ring r2"></div>
    <div class="ring r3"></div>
    <div class="dot"></div>
  </div>
  <div class="code">404</div>
  <h1>Page introuvable</h1>
  <p>La page que vous cherchez n'existe pas ou a été déplacée. Revenez à l'accueil pour explorer l'intelligence respiratoire mondiale.</p>
  <a href="/" class="btn">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Retour à l'accueil
  </a>
</body>
</html>
