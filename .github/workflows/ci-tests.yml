name: Tests & Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    name: Tests unitaires + validation données
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dev dependencies
        run: npm install --no-save

      - name: Vérification syntaxe JavaScript
        run: npm run check:js

      - name: Validation fichiers JSON
        run: npm run validate:data

      - name: Tests moteur clinique (orientations + soins)
        run: npm run test:clinical

      - name: Tests moteur diagnostique (symptômes + Z-score)
        run: npm run test:engine

      - name: Résumé
        if: always()
        run: |
          echo "──────────────────────────────────────────"
          echo "✅ Script.js syntaxe : OK"
          echo "✅ JSON data validation : OK"
          echo "✅ Clinical orientation tests : OK"
          echo "✅ Diagnostic engine tests (178 cas) : OK"
          echo "──────────────────────────────────────────"
