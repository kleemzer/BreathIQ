name: WHO DON Daily Fetch

on:
  schedule:
    # Every day at 07:00 UTC (WHO publishes DONs throughout the day)
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  fetch-who-don:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # Note: actions/checkout@v4 et setup-node@v4 tournent sur Node.js 20
    # (standard jusqu'au 16 juin 2026). Ne pas forcer Node.js 24 pour les actions
    # car elles ne le supportent pas encore pleinement.
    # L'utilisateur Node.js (scripts) utilise la version définie dans setup-node.

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # historique complet pour les rebases

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Fetch WHO Disease Outbreak News
        run: node scripts/who-don-fetch.mjs

      - name: Show fetched alerts
        run: |
          echo "--- who-alerts.json preview ---"
          head -30 data/who-alerts.json || echo "(fichier non généré)"

      - name: Commit and push if changed
        run: |
          git config user.name "WHO-Bot"
          git config user.email "bot@breathiq.fr"
          git add data/who-alerts.json
          if git diff --staged --quiet; then
            echo "✅ Aucune nouvelle alerte WHO — pas de commit"
          else
            ALERT_COUNT=$(jq -r '.alertCount // 0' data/who-alerts.json 2>/dev/null || echo 0)
            git commit -m "data: WHO DON update — ${ALERT_COUNT} alertes ($(date +%Y-%m-%d))"
            # Synchroniser avec le remote avant de pousser (évite les rejets fast-forward)
            git pull --rebase origin main || true
            git push origin main || {
              echo "⚠️  Push échoué — données écrites localement, sera retenté au prochain run"
              exit 0
            }
            echo "✅ who-alerts.json mis à jour (${ALERT_COUNT} alertes)"
          fi
