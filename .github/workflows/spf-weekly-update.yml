name: SPF Bulletin AI Update

on:
  schedule:
    # Every Monday at 09:00 UTC (SPF publishes BEH on Tuesdays, so we read the previous week's)
    - cron: '0 9 * * 1'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (print output without committing)'
        required: false
        default: 'false'
        type: boolean

jobs:
  update-spf-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        working-directory: scripts
        run: npm install --no-package-lock

      - name: Run SPF bulletin AI analysis
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: node scripts/spf-bulletin-ai.mjs

      - name: Show generated data
        run: cat data/spf-live.json

      - name: Commit and push if changed
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "SPF-Bot"
          git config user.email "bot@breathiq.fr"
          git add data/spf-live.json
          if git diff --staged --quiet; then
            echo "✅ Aucune modification détectée"
          else
            BULLETIN_DATE=$(jq -r '.bulletinDate // "inconnu"' data/spf-live.json 2>/dev/null || echo "inconnu")
            git commit -m "data: SPF BEH auto-update ${BULLETIN_DATE} ($(date +%Y-%m-%d))"
            git pull --rebase origin main || true
            git push origin main || {
              echo "⚠️  Push échoué — sera retenté au prochain run"
              exit 0
            }
            echo "✅ data/spf-live.json mis à jour et poussé"
          fi
